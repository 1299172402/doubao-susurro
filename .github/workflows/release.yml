name: Build and Release

on:
  push:
    branches: [ "**" ]
    tags:
      - 'v*'
    paths-ignore:
      - '*.md'
  pull_request:
    branches: [ "**" ]
    paths-ignore:
      - '*.md'

jobs:
  build:
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows amd64 (cross-compile from Ubuntu)
          - goos: windows
            goarch: amd64
            suffix: .exe
            runs-on: ubuntu-latest
            cgo_enabled: '1'
            cc: x86_64-w64-mingw32-gcc
            cxx: x86_64-w64-mingw32-g++
          # Windows 386 (cross-compile from Ubuntu)
          - goos: windows
            goarch: '386'
            suffix: .exe
            runs-on: ubuntu-latest
            cgo_enabled: '1'
            cc: i686-w64-mingw32-gcc
            cxx: i686-w64-mingw32-g++
          # Linux amd64 (native)
          - goos: linux
            goarch: amd64
            suffix: ''
            runs-on: ubuntu-latest
            cgo_enabled: '1'
            cc: gcc
            cxx: g++
          # macOS amd64 (native)
          - goos: darwin
            goarch: amd64
            suffix: ''
            runs-on: macos-latest
            cgo_enabled: '1'
            cc: gcc
            cxx: g++
          # macOS arm64 (native, for Apple Silicon)
          - goos: darwin
            goarch: arm64
            suffix: ''
            runs-on: macos-latest
            cgo_enabled: '1'
            cc: gcc
            cxx: g++

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      # 为 Linux 构建安装原生依赖
      - name: Install dependencies (Linux native)
        if: matrix.goos == 'linux'
        run: |
          # sudo apt install golang
          sudo snap install go  --classic

          # gcc
          sudo apt install gcc libc6-dev

          # x11
          sudo apt install libx11-dev xorg-dev libxtst-dev

          # Clipboard
          sudo apt install xsel xclip

          # Bitmap
          sudo apt install libpng++-dev

          # GoHook
          sudo apt install xcb libxcb-xkb-dev x11-xkb-utils libx11-xcb-dev libxkbcommon-x11-dev libxkbcommon-dev

      # 为 Windows 交叉编译安装 MinGW-w64 及必要库
      - name: Install dependencies (Windows cross-compile)
        if: matrix.goos == 'windows'
        run: |
          sudo apt install gcc-multilib
          sudo apt install gcc-mingw-w64
          # fix err: zlib.h: No such file or directory, Just used by bitmap.
          sudo apt install libz-mingw-w64-dev

      # 构建二进制
      - name: Build app
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo_enabled }}
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          VERSION=${GITHUB_REF_NAME:-dev}
          LDFLAGS="-s -w -X Doubao-Susurro/info.Version=${VERSION}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            LDFLAGS="${LDFLAGS} -H windowsgui"
          fi
          go build -ldflags="${LDFLAGS}" -o "Doubao-Susurro${{ matrix.suffix }}" ./cmd/app
        shell: bash

      # 上传构建产物
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: Doubao-Susurro-${{ github.ref_name || 'dev' }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            Doubao-Susurro${{ matrix.suffix }}

  # 仅在推送 tag 时创建 GitHub Release 并附加所有产物
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          skip-decompress: true

      - name: Release to Lanzou Cloud
        uses: 1299172402/lanzou_release@v1
        with:
          ylogin: ${{ secrets.LANZOU_YLOGIN }}
          phpdisk_info: ${{ secrets.LANZOU_PHPDISK_INFO }}
          folder_id: ${{ secrets.LANZOU_FOLDER_ID }}
          file_path: 'artifacts/**/*'

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*
